name: Lipstick Ledger
options:
  bundleIdPrefix: com.shimondeitel.lipstickledger
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Lipstick Ledger:
    type: application
    platform: iOS
    sources:
      - path: Lipstick Ledger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.lipstickledger
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Lipstick Ledger/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Lipstick LedgerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Lipstick LedgerTests
      - path: Lipstick Ledger.storekit
    dependencies:
      - target: Lipstick Ledger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.lipstickledger.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Lipstick LedgerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Lipstick LedgerUITests
    dependencies:
      - target: Lipstick Ledger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.lipstickledger.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Lipstick Ledger:
    build:
      targets:
        Lipstick Ledger: all
        Lipstick LedgerTests: [test]
        Lipstick LedgerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Lipstick Ledger.storekit
    test:
      config: Debug
      storeKitConfiguration: Lipstick Ledger.storekit
      targets:
        - Lipstick LedgerTests
        - Lipstick LedgerUITests
    archive:
      config: Release
